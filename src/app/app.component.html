<div class="container ">


    <div class="row">


        <ng-container *ngFor="let silla of Sillas " style="border: 2px solid darkblue;">

            <div class=" col-2  col-md-2  bg-primary text-white text-center alert alert-dark " *ngIf="silla<=4" style="height: 90px;width:90px">{{silla}}</div>
            <div class="Tarima col-md-4 col-sm-4 col-lg-4  bg-secondary text-center " *ngIf="silla==4">TARIMA</div>

            <div class=" col-2  col-md-2  bg-primary text-white text-center alert alert-dark " *ngIf="silla>4" style="height: 80px;width:80px">{{silla}}</div>


        </ng-container>


        <div class="General col bg-success col-12  text-white text-center">GENERAL</div>


    </div>
</div>
